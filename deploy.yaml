import:
  - recipe/laravel.php

config:
  repository: 'git@github.com:Sorel-Haller/RRaamistik.git'
  keep_releases: 2

hosts:
  stage:
    hostname: 'ta24haller.itmajakas.ee'
    http_user: virt137756
    remote_user: virt137756
    forward_agent: true
    deploy_path: '~/domeenid/www.ta24haller.itmajakas.ee/raamistikud'

tasks:
  npm:production:
    - run: 'cd {{release_path}} && npm install'
    - run: 'cd {{release_path}} && npx vite build'

  opcache:clear:
    - run: killall php84-cgi || true

after:
  deploy:failed: deploy:unlock
  deploy:success: opcache:clear