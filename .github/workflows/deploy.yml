name: Production deploy

on:
  workflow_dispatch:

concurrency:
  group: production_environment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ta24haller.itmajakas.ee >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: ssh -i ~/.ssh/id_ed25519 virt137756@ta24haller.itmajakas.ee "echo SSH OK"

      - name: Deploy with Deployer
        uses: deployphp/action@v2
        with:
          deployer-version: "7.5.12"
          dep: deploy -vvv
          private-key: ${{ secrets.PRIVATE_KEY }}